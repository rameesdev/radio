<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a0f0a" />

    <!-- ✅ Title: 50-60 chars including brand -->
    <title>Virtual Radio – Free Online Radio Station Maker</title>

    <!-- ✅ Meta Description: 139 chars (already optimal) -->
    <meta
      name="description"
      content="Create a real-time, synchronized custom frequency radio station. Upload MP3s and broadcast to multiple listeners with sub-3 second latency."
    />

    <!-- ✅ Canonical Tag -->
    <link rel="canonical" href="https://ramzradio.in/" />

    <!-- ✅ Keyword-targeted meta keywords -->
    <meta name="keywords" content="virtual radio, online radio station maker, synchronized audio streaming, real-time radio, listen together online, host radio station free, shared music listening" />

    <!-- ✅ Robots -->
    <meta name="robots" content="index, follow" />

    <!-- ✅ Facebook Open Graph Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ramzradio.in/" />
    <meta property="og:title" content="Virtual Radio – Free Online Radio Station Maker" />
    <meta property="og:description" content="Create a real-time, synchronized custom frequency radio station. Upload MP3s and broadcast to multiple listeners with sub-3 second latency." />
    <meta property="og:image" content="https://ramzradio.in/og-image.png" />
    <meta property="og:site_name" content="Virtual Radio" />
    <meta property="og:locale" content="en_US" />

    <!-- ✅ X (Twitter) Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ramzradio" />
    <meta name="twitter:title" content="Virtual Radio – Free Online Radio Station Maker" />
    <meta name="twitter:description" content="Create a real-time, synchronized custom frequency radio station. Upload MP3s and broadcast to multiple listeners with sub-3 second latency." />
    <meta name="twitter:image" content="https://ramzradio.in/og-image.png" />

    <!-- ✅ XML Sitemap (hint for crawlers) -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- ✅ SoftwareApplication Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Virtual Radio",
        "url": "https://ramzradio.in",
        "operatingSystem": "Web Browser",
        "applicationCategory": "MultimediaApplication",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "description": "Create a real-time, synchronized custom frequency radio station. Upload MP3s and broadcast to multiple listeners with sub-3 second latency.",
        "featureList": "Sub-3-second sync, Shared playback controls, Custom frequency creation, Late joiner sync"
      }
    </script>

    <!-- ✅ Organization / Identity Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Virtual Radio",
        "url": "https://ramzradio.in",
        "logo": "https://ramzradio.in/logo192.png",
        "description": "Virtual Radio provides free real-time synchronized online radio stations for remote teams, D&D groups, and music producers.",
        "sameAs": [
          "https://www.facebook.com/ramzradio",
          "https://twitter.com/ramzradio",
          "https://www.instagram.com/ramzradio",
          "https://www.linkedin.com/company/ramzradio",
          "https://www.youtube.com/@ramzradio"
        ]
      }
    </script>

    <!-- ✅ WebSite / Sitelinks Searchbox Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Virtual Radio",
        "url": "https://ramzradio.in"
      }
    </script>
  </head>
  <body>
    <noscript>Virtual Radio requires JavaScript. Enable it to create and join real-time synchronized radio stations online for free.</noscript>
    <div id="root"></div>
  </body>
</html>
